<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}darwin_rag{% endblock %}</title>
<link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">
</head>
<body>
<header>
  <div class="container header-row">
    <a href="/" class="brand">darwin_rag · chat history</a>
    <nav class="nav">

      <a href="/bans">Баны</a>

</main>
<footer>
  <div class="container muted">
    Питомник «Сажень» (Томск) · история чатов Telegram-бота
  </div>

</html>
